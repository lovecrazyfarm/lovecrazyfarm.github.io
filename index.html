    <style>
        .scroll-content::-webkit-scrollbar { width: 5px; }
        .scroll-content::-webkit-scrollbar-track { background: #e0e8f0; border-radius: 3px; }
        .scroll-content::-webkit-scrollbar-thumb { background: #8aacc9; border-radius: 3px; }

        .tag-transition { transition: all 0.2s ease; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes meteor {
            0% {
                transform: translateX(0) translateY(0) rotate(135deg);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translateX(300px) translateY(300px) rotate(135deg);
                opacity: 0;
            }
        }
        
        .meteor {
            position: absolute;
            width: 2px;
            height: 50px;
            background: linear-gradient(135deg, rgba(255,240,180,0.9), rgba(255,200,100,0.6), rgba(255,255,255,0));
            transform: rotate(135deg);
            animation: meteor 1.6s linear infinite;
            opacity: 0;
            filter: blur(0.5px);
            pointer-events: none;
            z-index: 5;
        }
        
        .text-shadow-black {
            text-shadow: -0.5px -0.5px 0 #000000, 0.5px -0.5px 0 #000000, -0.5px 0.5px 0 #000000, 0.5px 0.5px 0 #000000;
        }
        
        .content-bg {
            background: #fefef7;
        }
        
        body {
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        /* 横向输入组样式 */
        .horizontal-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 0.8;
            min-width: 130px;
        }
        .horizontal-input-group label {
            white-space: nowrap;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6366f1;
            margin-bottom: 0;
        }
        .horizontal-input-group input {
            flex: 1;
            min-width: 0;
            padding: 0.45rem 0.7rem;
            font-size: 0.8rem;
        }
        
        .time-input-group {
            flex: 1.2;
            min-width: 200px;
        }
        
        @media (max-width: 768px) {
            .horizontal-input-group {
                flex: 1;
                min-width: 100%;
            }
            .time-input-group {
                min-width: 100%;
            }

</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 font-sans antialiased overflow-y-auto overflow-x-hidden p-6">

                <div class="meteor" style="top: 12%; left: 40%; animation-delay: 0.8s;"></div>
                <div class="meteor" style="top: 15%; left: 55%; animation-delay: 1.2s;"></div>
                <div class="meteor" style="top: 18%; left: 70%; animation-delay: 1.6s;"></div>
                <div class="star" style="width: 1.5px; height: 1.5px; top: 10%; left: 8%;"></div>
                <div class="star" style="width: 2px; height: 2px; top: 20%; left: 85%;"></div>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wide drop-shadow-[0_2px_10px_rgba(0,0,0,0.3)] relative z-10">
                疯狂农场作物价格计算器
            </h1>
            <p class="text-indigo-200 bg-white/10 inline-block px-4 py-1 rounded-full mt-2 text-sm font-semibold backdrop-blur-sm relative z-10">
                ✨ 开源 · 免费 · 易用 ✨
            </p>
        </div>
        
        <div class="p-6 md:p-8 content-bg">
            <div class="flex flex-wrap gap-2 mb-4">

                <button @click="openModal('disclaimer')" class="bg-white/80 backdrop-blur-sm px-4 py-1.5 rounded-full text-sm text-indigo-700 shadow-sm hover:bg-white hover:shadow-md transition-all">免责声明</button>
                <button @click="openModal('support')" class="bg-white/80 backdrop-blur-sm px-4 py-1.5 rounded-full text-sm text-indigo-700 shadow-sm hover:bg-white hover:shadow-md transition-all">联系作者</button>
				<div class="text-center flex items-center justify-center gap-2 py-3">
					<img src="beian.png" class="w-4 h-4">
					<span class="text-xs text-black">桂ICP备2026005605号</span>
				</div>
			</div>
			
			
            
            <div class="mb-6 pb-4 border-b border-blue-200">
                <div class="text-xs font-semibold uppercase tracking-wider text-indigo-500 mb-3">📂版本</div>
                <div class="flex flex-wrap gap-3">
                    <template x-for="cat in categories" :key="cat.id">
                        <button @click="selectCategory(cat.id)" :class="selectedCategory === cat.id ? 'bg-indigo-500 text-white shadow-lg scale-105' : 'bg-white/80 text-indigo-600 shadow-sm hover:bg-white'" class="px-5 py-2.5 rounded-full font-bold text-sm transition-all hover:scale-105" x-text="cat.name"></button>
                    </template>
                </div>
            </div>
            
            <div class="mb-6 pb-4 border-b border-blue-200">

                </div>
                <div class="flex flex-wrap gap-3">
                    <template x-for="crop in filteredCrops" :key="crop.id">

                    </template>
                    <div x-show="filteredCrops.length === 0" class="w-full text-center py-6 text-indigo-400 text-sm">无可选作物</div>
                </div>
            </div>

                    <div class="horizontal-input-group">

                    </div>
                    <div class="horizontal-input-group">
                        <label>百分比</label>
                        <input type="text" x-model="percentInput" @input="updateFromPercent" @blur="handlePercentBlur" class="flex-1 px-2.5 py-1.5 rounded-full border border-blue-200 bg-white text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200" oninput="this.value = this.value.replace(/[^\d.]/g, '').replace(/^\./, '0.').replace(/\.{2,}/g, '.').replace(/(\..*)\./g, '$1').replace(/(\.\d{2})\d+/, '$1')" :placeholder="percentPlaceholder">
                    </div>

                    <div class="time-input-group">

                </div>
            </div>

					<span class="text-emerald-700 font-bold text-sm" x-text="selectedTags.length"></span>

					<span class="text-xs font-normal text-gray-400">(点击取消)</span>
				</div>
				<div class="flex flex-wrap gap-2">
					<template x-for="tag in selectedTags" :key="tag.id">

					</template>
				</div>
			</div>
        </div>

        </div>

				<button @click="modalOpen = false" class="text-indigo-400 hover:text-indigo-600 text-2xl leading-none">&times;</button>
			</div>
			<div class="p-4 text-sm text-indigo-700 leading-relaxed overflow-y-auto flex-1" x-html="modalContent"></div>
		</div>
	</div>
</div>

// ==================== Alpine.js 组件 ====================
function farmCalculator() {
    return {
        categories: categories,
        selectedCategory: 'cat_guowang',
        selectedCropId: null,
        currentCrop: null,
        weightInput: '',
        percentInput: '',
        timeInput: '',
        checkedTags: new Map(),
        modalOpen: false,
        modalTitle: '',
        modalContent: '',
        focusMode: false,

        get minWeight() {
            if (!this.currentCrop) return 0;
            return this.currentCrop.maxWeight / 34;
        },
        
        getAllTags() {
            if (!this.currentCrop) return [];
            const tagIds = this.getUniqueTagIds(this.currentCrop);
            return tagIds.map(id => tagLibrary[id]).filter(t => t);
        },
        
        get selectedTags() {
            const allTags = this.getAllTags();
            const selected = allTags.filter(tag => this.checkedTags.get(tag.id) === true);
            return selected.sort((a, b) => {
                if (a.priority !== b.priority) return a.priority - b.priority;
                return b.times - a.times;
            });
        },
        
        get unselectedTagsByLevel() {
            const allTags = this.getAllTags();
            const unselected = allTags.filter(tag => this.checkedTags.get(tag.id) !== true);
            const sortFn = (a, b) => {
                if (a.priority !== b.priority) return a.priority - b.priority;
                return b.times - a.times;
            };
            const level0 = unselected.filter(t => t.level === 0).sort(sortFn);
            const level1 = unselected.filter(t => t.level === 1).sort(sortFn);
            const level2 = unselected.filter(t => t.level === 2).sort(sortFn);
            return { level0, level1, level2 };
        },
        
        get filteredCrops() {
            let crops = itemsData.filter(c => c.categories.includes(this.selectedCategory));
            if (this.focusMode && this.selectedCropId) {
                crops = crops.filter(c => c.id === this.selectedCropId);
            }
            return crops.sort((a, b) => (a.priority || 999) - (b.priority || 999));
        },
        
        get formattedPrice() {
            const total = this.computeTotalValue();
            if (total >= 100000000) return (total / 100000000).toFixed(2) + '亿';
            if (total >= 10000) return (total / 10000).toFixed(2) + '万';
            return total.toFixed(0);
        },
        
        get maturityTimeDisplay() {
            if (!this.currentCrop) return '';
            const totalSeconds = this.calculateGrowthTimeFromCurrentWeight();
            if (totalSeconds === null) return '';
            return this.formatTime(totalSeconds);
        },
        
        get weightPlaceholder() {
            if (!this.currentCrop) return '';
            const minW = this.minWeight.toFixed(2);
            const maxW = this.currentCrop.maxWeight.toFixed(2);
            return `${minW} ~ ${maxW} kg`;
        },

        get percentPlaceholder() {
            if (!this.currentCrop) return '';
            const minP = Math.ceil(((this.minWeight / this.currentCrop.maxWeight) * 100));
            return `${minP}% ~ 100%`;
        },
        
        calculateGrowthTimeFromCurrentWeight() {
            if (!this.currentCrop) return null;
            let weight = parseFloat(this.weightInput);
            if (isNaN(weight) || weight <= 0) return 0;
            return weight * this.currentCrop.growthSpeed;
        },

        formatTime(seconds) {
            if (seconds < 60) {
                return `${seconds.toFixed(1)} 秒`;
            } else if (seconds < 3600) {
                const minutes = Math.floor(seconds / 60);
                return `${minutes} 分钟`;
            } else {
                const hours = Math.floor(seconds / 3600);
                const remainMinutes = Math.floor((seconds % 3600) / 60);
                if (remainMinutes === 0) {
                    return `${hours} 小时`;
                }
                return `${hours} 小时 ${remainMinutes} 分钟`;
            }
        },
        
        init() {
            this.renderUnselectedTags();
        },
        
        selectCategory(catId) {
            this.selectedCategory = catId;
            this.selectedCropId = null;
            this.currentCrop = null;
            this.focusMode = false;
            this.clearAllInputs();
            this.checkedTags.clear();
            this.renderUnselectedTags();
        },
        
        selectCrop(crop) {
            if (this.selectedCropId === crop.id) {
                this.selectedCropId = null;
                this.currentCrop = null;
                this.focusMode = false;
                this.clearAllInputs();
                this.checkedTags.clear();
            } else {
                this.selectedCropId = crop.id;
                this.currentCrop = crop;
                this.focusMode = true;
                this.clearAllInputs();
                this.initCheckedTags();
            }
            this.renderUnselectedTags();
        },
        
        clearAllInputs() {
            this.weightInput = '';
            this.percentInput = '';
            this.timeInput = '';
        },
        
        initCheckedTags() {
            this.checkedTags.clear();
            if (!this.currentCrop) return;
            const tags = this.getUniqueTagIds(this.currentCrop);
            tags.forEach(tid => this.checkedTags.set(tid, false));
        },
        
        getUniqueTagIds(item) {
            if (!item || !item.tagGroups) return [];
            const tagIdSet = new Set();
            for (const groupKey of item.tagGroups) {
                const group = tagGroups[groupKey];
                if (group && group.tags) {
                    group.tags.forEach(tid => tagIdSet.add(tid));
                }
            }
            return Array.from(tagIdSet);
        },
        
        updateFromWeight() {
            if (!this.currentCrop) return;
            let val = parseFloat(this.weightInput);
            if (isNaN(val)) return;
            
            const minW = this.minWeight;
            const maxW = this.currentCrop.maxWeight;
            
            if (val < minW || val > maxW) return;
            
            this.percentInput = ((val / maxW) * 100).toFixed(1);
            this.updateTimeFromWeight(val);
        },
        
        updateFromPercent() {
            if (!this.currentCrop) return;
            let pct = parseFloat(this.percentInput);
            if (isNaN(pct)) return;
            
            const minP = (this.minWeight / this.currentCrop.maxWeight) * 100;
            if (pct < minP || pct > 100) return;
            
            const weight = (pct / 100) * this.currentCrop.maxWeight;
            this.weightInput = weight.toFixed(2);
            this.updateTimeFromWeight(weight);
        },

        updateFromTime() {
            if (!this.currentCrop) return;
            let time = parseFloat(this.timeInput);
            if (isNaN(time)) return;

            const weight = (time * 100) / this.currentCrop.growthSpeed;
            const minW = this.minWeight;
            const maxW = this.currentCrop.maxWeight;
            
            if (weight >= minW && weight <= maxW) {
                this.updateFromWeightInput(weight);
            }
        },
        
        updateFromWeightInput(weight) {
            const maxW = this.currentCrop.maxWeight;
            this.weightInput = weight.toFixed(2);
            this.percentInput = ((weight / maxW) * 100).toFixed(1);
        },
        
        updateTimeFromWeight(weight) {
            const time = (weight * this.currentCrop.growthSpeed) / 100;
            this.timeInput = time.toFixed(2);
        },

        handleWeightBlur() {
            if (!this.currentCrop) return;
            let val = parseFloat(this.weightInput);
            if (isNaN(val)) return;
            
            const maxW = this.currentCrop.maxWeight;
            const minW = this.minWeight;
            
            if (val > maxW) {
                this.weightInput = maxW.toFixed(2);
                this.updateFromWeight();
            } else if (val < minW) {
                this.weightInput = minW.toFixed(2);
                this.updateFromWeight();
            }
        },

        handlePercentBlur() {
            if (!this.currentCrop) return;
            let pct = parseFloat(this.percentInput);
            if (isNaN(pct)) return;
            
            const minP = (this.minWeight / this.currentCrop.maxWeight) * 100;
            
            if (pct < minP) {
                this.percentInput = Math.ceil(minP);
                this.updateFromPercent();
            } else if (pct > 100) {
                this.percentInput = 100;
                this.updateFromPercent();
            }
        },

        handleTimeBlur() {
            if (!this.currentCrop) return;
            let time = parseFloat(this.timeInput);
            if (isNaN(time)) {
                this.timeInput = '';
                return;
            }
            
            this.timeInput = time.toFixed(2);
            
            if (time < 0) {
                time = 0;
                this.timeInput = '0';
            }
            
            const weight = (time * 100) / this.currentCrop.growthSpeed;
            const minW = this.minWeight;
            const maxW = this.currentCrop.maxWeight;
            
            if (weight < minW) {
                const minTime = (minW * this.currentCrop.growthSpeed) / 100;
                this.timeInput = minTime.toFixed(2);
                time = minTime;
            } else if (weight > maxW) {
                const maxTime = (maxW * this.currentCrop.growthSpeed) / 100;
                this.timeInput = maxTime.toFixed(2);
                time = maxTime;
            }

            const finalWeight = (time * 100) / this.currentCrop.growthSpeed;
            this.updateFromWeightInput(finalWeight);
        },
        
        computeTotalValue() {
            if (!this.currentCrop) return 0;
            let weight = parseFloat(this.weightInput);
            if (isNaN(weight) || weight <= 0) return 0;
            let base = this.currentCrop.basePrice;
            let weightPower = Math.pow(weight, 1.5);
            let level0Multi = 1.0, level1Multi = 1.0, sumLevel2 = 0.0;
            const tags = this.getUniqueTagIds(this.currentCrop);
            for (let tagId of tags) {
                if (this.checkedTags.get(tagId) === true) {
                    const tag = tagLibrary[tagId];
                    if (tag) {
                        if (tag.level === 0) level0Multi *= tag.times;
                        else if (tag.level === 1) level1Multi *= tag.times;
                        else if (tag.level === 2) sumLevel2 += tag.times;
                    }
                }
            }
            return base * weightPower * level0Multi * level1Multi * (1 + sumLevel2);
        },
        
        toggleTag(tagId) {
            const isChecked = this.checkedTags.get(tagId) === true;
            const newMap = new Map(this.checkedTags);
            
            if (!isChecked) {
                newMap.set(tagId, true);
                
                for (const group of exclusiveGroups) {
                    if (group.tags.includes(tagId)) {
                        group.tags.forEach(otherId => {
                            if (otherId !== tagId && newMap.get(otherId) === true) {
                                newMap.set(otherId, false);
                            }
                        });
                    }
                }
                
                const parentComposites = [];
                for (const [compositeId, def] of Object.entries(tagLibrary)) {
                    if (def.synthesis && def.synthesis.includes(tagId) && newMap.get(compositeId) === true) {
                        parentComposites.push(compositeId);
                    }
                }
                for (const parentId of parentComposites) {
                    newMap.set(parentId, false);
                }
                
                let changed = true;
                let loop = 0;
                while (changed && loop++ < 10) {
                    changed = false;
                    for (const [compositeId, def] of Object.entries(tagLibrary)) {
                        if (def.synthesis && def.synthesis.length > 0) {
                            const allChildrenChecked = def.synthesis.every(child => newMap.get(child) === true);
                            if (allChildrenChecked && newMap.get(compositeId) !== true) {
                                newMap.set(compositeId, true);
                                def.syndel.forEach(sub => newMap.set(sub, false));
                                changed = true;
                            }
                        }
                    }
                }
                
                for (const [compositeId, def] of Object.entries(tagLibrary)) {
                    if (def.syndel && def.syndel.length > 0 && newMap.get(compositeId) === true) {
                        for (let sub of def.syndel) {
                            if (newMap.get(sub) === true) {
                                newMap.set(sub, false);
                            }
                        }
                    }
                }
                
            } else {
                newMap.set(tagId, false);
                
                for (const [compositeId, def] of Object.entries(tagLibrary)) {
                    if (def.synthesis && def.synthesis.includes(tagId)) {
                        if (newMap.get(compositeId) === true) {
                            const stillAllChecked = def.synthesis.every(child => newMap.get(child) === true);
                            if (!stillAllChecked) {
                                newMap.set(compositeId, false);
                            }
                        }
                    }
                }
            }
            
            this.checkedTags = newMap;
            this.renderUnselectedTags();
        },
        
        renderUnselectedTags() {
            const container = document.getElementById('unselectedTagsContainer');
            if (!this.currentCrop) {
                container.innerHTML = '<div class="text-indigo-400 text-sm py-4 text-center">未选择作物</div>';
                return;
            }
            
            const { level0, level1, level2 } = this.unselectedTagsByLevel;
            
            const renderGroup = (tags, title) => {
                if (tags.length === 0) return '';
                let html = `<div class="mb-4"><div class="text-xs font-semibold text-indigo-500 mb-2 pl-1 border-l-3 border-indigo-300">${title}</div><div class="flex flex-wrap gap-2">`;
                for (let tag of tags) {
                    html += `<div @click="toggleTag('${tag.id}')" class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-md" style="background: ${tag.fillColor}; border: 2px solid transparent; color: white; text-shadow: -0.5px -0.5px 0 #000, 0.5px -0.5px 0 #000, -0.5px 0.5px 0 #000, 0.5px 0.5px 0 #000;">${tag.name}</div>`;
                }
                html += `</div></div>`;
                return html;
            };
            
            let html = renderGroup(level0, '基础突变');
            html += renderGroup(level1, '专属突变');
            html += renderGroup(level2, '常规突变');
            container.innerHTML = html || '<div class="text-indigo-400 text-sm py-4 text-center">暂无可用突变</div>';
            
            this.$nextTick(() => {
                container.querySelectorAll('[x-on\\:click]').forEach(el => {
                    const handler = el.getAttribute('x-on:click');
                    el.removeAttribute('x-on:click');
                    el.setAttribute('@click', handler);
                });
            });
        },
